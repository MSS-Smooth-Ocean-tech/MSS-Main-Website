<style>
.partners-strip {
  background: #fff;

}

.partners-container {
  max-width: 1200px;

}

.partners-track {
  display: flex;
  width: max-content;
  animation: scroll-left 20s linear infinite;
}

.partners-track:hover {
  animation-play-state: paused;
}

@keyframes scroll-left {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.partners-inner {
  display: flex;
  align-items: center;
  gap: 90px;
  padding: 0 55px;
}

/* Logo container (NEW) */
.partner-item {

  justify-content: center;
  height: 70px;   /* consistent height */
}

/* Logo image */
.partner-item img {
  max-height: 75px;   /* fits inside box */
  max-width: 200px;   /* prevents super wide logos */
  object-fit: contain;
  transition: all 0.3s ease;
}

.partner-item:hover {
  color: #2563eb;
  transform: translateY(-2px);
}


/* Hover effect */
.partner-item:hover img {
  filter: grayscale(0%);
}

/* Text */
.partner-item span {
  font-family: 'Sora', sans-serif;
  font-size: 1.05rem;
