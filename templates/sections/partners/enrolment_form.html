<section class="pf-section">
  <div class="pf-header">
    <span class="eyebrow">Partnerships</span>
    <h2 class="sec-title">Join Our Global Network</h2>
    <p class="pf-sub">
      Partner with us to expand your reach, streamline logistics, and grow faster in a connected global network.
    </p>
  </div>

  <div class="pf-card">
    <h2 class="pf-title">Apply to Become a Partner</h2>
    <div class="pf-field">
      <label>Partnership Type</label>
      <select>
        <option>Select partnership type</option>
        <option>Freight Partner</option>
        <option>Service Partner</option>
        <option>Technology Partner</option>
      </select>
    </div>
    <div class="pf-heading">Company Information</div>
    <div class="pf-grid">
      <input type="text" placeholder="Company / Person Name" />
      <input type="text" placeholder="Website" />
      <input type="text" placeholder="Country / Region" />
      <select>
        <option>Industry</option>
        <option>Freight Forwarder</option>
        <option>Shipping Line</option>
        <option>NVOCC</option>
        <option>Others</option>
      </select>
    </div>
    <div class="pf-heading">Contact Details</div>
    <div class="pf-grid">
      <input type="text" placeholder="Full Name *" />
      <input type="email" placeholder="Email Address *" />
      <input class="pf-full" type="tel" placeholder="Phone Number *" />
    </div>
    <div class="pf-heading">Partnership Details</div>
    <div class="pf-field">
      <select>
        <option>Focus Sector</option>
        <option>Freight Forwarder</option>
        <option>Shipping Line</option>
        <option>NVOCC</option>
      </select>
    </div>
    <textarea placeholder="Expected Volume / Use Case"></textarea>
    <div class="pf-checks">
      <label><input type="checkbox" /> Agree to terms & conditions</label>
      <label><input type="checkbox" /> Consent to contact</label>
    </div>
    <button class="pf-btn">Submit Application</button>
  </div>

</section>
