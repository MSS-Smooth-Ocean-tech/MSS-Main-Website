<section class="pf-section" id="partner-form">
  <div class="pf-header">
    <h2 class="sec-title">Let's Get Started</h2>
  </div>

  <div class="pf-card">
    <h2 class="pf-title">Start Your Application</h2>
    <div class="pf-field">
      <label>Partnership Type</label>
      <select>
        <option>Select partnership type</option>
        <option>Referral Partner</option>
        <option>Reseller Partner</option>
        <option>Technology Partner</option>
        <option>Operational Partner</option>
      </select>
    </div>
    <div class="pf-heading">Company Information</div>
    <div class="pf-grid">
      <input type="text" placeholder="Company / Person Name" />
      <input type="text" placeholder="Website" />
      <input type="text" placeholder="Country / Region" style="grid-column: span 2;" />
    </div>
    <div class="pf-heading">Contact Details</div>
    <div class="pf-grid">
      <input type="text" placeholder="Full Name *" />
      <input type="email" placeholder="Email Address *" />
      <input class="pf-full" type="tel" placeholder="Phone Number *" />
    </div>
    <div class="pf-heading">Partnership Details</div>
    <div class="pf-field">
      <select>
        <option>Focus Sector</option>
        <option>Freight Forwarder</option>
        <option>Shipping Line</option>
        <option>NVOCC</option>
      </select>
    </div>
    <textarea placeholder="Expected Volume / Use Case"></textarea>
    <div class="pf-checks">
      <!-- <label><input type="checkbox" /> Agree to terms & conditions</label> -->
      <label><input type="checkbox" /> Consent to contact</label>
    </div>
    <button class="pf-btn">Submit Application</button>
  </div>

</section>
