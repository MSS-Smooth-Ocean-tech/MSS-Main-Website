<section id="calculator">
  <div class="section-wrap">
    <h2 class="section-title">Calculate Your ROI</h2>
    <p class="section-sub">Adjust the sliders to see how much you could save annually with MSS.</p>

    <div class="roi-card">

      <!-- LEFT: Configuration -->
      <div class="roi-left">
        <div class="roi-left-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          Configuration
        </div>

        <div class="roi-field">
          <div class="roi-field-header">
            <label class="roi-field-label">Current Team Size</label>
            <span class="roi-field-val" id="team-val">15 FTEs</span>
          </div>
          <input type="range" id="team-slider" min="1" max="50" value="15" oninput="roiUpdate()">
          <div class="roi-range-ends"><span>1</span><span>50</span></div>
        </div>

        <div class="roi-field">
          <div class="roi-field-header">
            <label class="roi-field-label">Monthly Shipment Volume</label>
            <span class="roi-field-val" id="vol-val">2,500</span>
          </div>
          <input type="range" id="vol-slider" min="100" max="10000" step="100" value="2500" oninput="roiUpdate()">
          <div class="roi-range-ends"><span>100</span><span>10k+</span></div>
        </div>

        <div class="roi-field">
          <label class="roi-field-label" style="margin-bottom:8px; display:block;">Operational Region</label>
          <select id="region-select" class="roi-select" onchange="roiUpdate()">
            <option value="1.0">North America</option>
            <option value="0.85">Europe</option>
            <option value="0.70">Asia Pacific</option>
            <option value="0.75">Middle East</option>
          </select>
        </div>

        <p class="roi-note">* Estimates based on average industry labor rates and overheads for 2025.</p>
      </div>

       <!-- RIGHT -->
      <div class="calc-right">
        <div class="calc-chart-wrap">
          <div class="calc-bars">

            <div class="calc-bar-col">
              <div class="bar-amount" id="inhouse-amt-hp">—</div>
              <div class="bar-track">
                <div class="bar-fill bar-inhouse" id="bar-inhouse-hp"></div>
              </div>
              <div class="bar-label">IN-HOUSE</div>
            </div>

            <div class="calc-bar-col">
              <div class="bar-top-badge">
                <span class="savings-badge" id="savings-badge-hp" style="visibility:hidden;">0% Saved</span>
                <div class="bar-amount blue" id="mss-amt-hp">—</div>
              </div>
              <div class="bar-track">
                <div class="bar-fill bar-mss" id="bar-mss-hp"></div>
              </div>
              <div class="bar-label">WITH MSS</div>
            </div>

          </div>
          <p class="calc-chart-note">Based on industry averages for mid-sized shipping logistics.</p>
        </div>
      </div>
    </div>
  </div>
</section>
