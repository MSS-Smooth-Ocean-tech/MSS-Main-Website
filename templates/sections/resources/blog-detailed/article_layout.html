<!-- ══ ARTICLE LAYOUT ══ -->
<div class="article-layout">

  <!-- ── HEADER: full width ── -->
  <div class="article-header">
    <h1 class="article-headline">{{ blog.title }}</h1>
    <p class="article-intro">{{ blog.summary }}</p>
  </div>

  <!-- ── BODY ── -->
  {% if blog.cover_image %}
<div class="article-body article-body-with-image">
  
  <div class="article-float-img">
    <img
      src="{{ blog.cover_image }}"
      alt="{{ blog.title }}"
      loading="eager"
    />
  </div>

  <div class="article-text">
    {{ blog.body | safe }}
  </div>

</div>
{% else %}
<div class="article-body">
  {{ blog.body | safe }}
</div>
{% endif %}

  <!-- ── SHARE FOOTER ── -->
  <div class="article-share-footer">
    <div class="share-footer-label">Share This Insight</div>
    <div class="share-footer-btns">
      <button class="share-btn">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Copy Link
      </button>
    </div>
  </div>

</div>
<style>
  .article-float-img {
  float: left;
  width: 320px;
  margin: 0 30px 20px 0;
}

.article-float-img img {
  width: 100%;
  border-radius: 8px;
}

/* 🔥 THIS FIXES YOUR ISSUE */
.article-text > *:first-child {
  margin-top: 0;
}

/* Prevent elements from breaking the float */
.article-text h1,
.article-text h2,
.article-text h3,
.article-text div,
.article-text section {
  clear: none !important;
}

/* Optional: cleaner flow */
.article-body::after {
  content: "";
  display: block;
  clear: both;
}
</style>
