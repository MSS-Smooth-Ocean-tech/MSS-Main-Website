{% if certificate_status() %}
  <style>
    .partners-strip {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      padding: 40px 0;
    }
    .partners-container {
      max-width: 1200px;
      margin: 0 auto;
      overflow: hidden;
    }
    .partners-track {
      display: flex;
      width: max-content;
      animation: scroll-left 20s linear infinite;
    }
    .partners-track:hover {
      animation-play-state: paused;
    }
    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .partners-inner {
      display: flex;
      align-items: center;
      gap: 90px;
      padding: 0 55px;
    }
    /* Logo container (NEW) */
    .partner-item {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 70px;   /* consistent height */
    }
    /* Logo image */
    .partner-item img {
      max-height: 75px;   /* fits inside box */
      max-width: 200px;   /* prevents super wide logos */
      object-fit: contain;
      transition: all 0.3s ease;
    }
    .partner-item:hover {
      color: #2563eb;
      transform: translateY(-2px);
    }
    /* Hover effect */
    .partner-item:hover img {
      filter: grayscale(0%);
    }
    /* Text */
    .partner-item span {
      font-family: 'Sora', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
  <section class="partners-strip">
    <div class="partners-container">
      <div class="partners-track">
        {% for i in range(5) %}
          <div class="partners-inner" {% if i!=0 %} aria-hidden="true" {% endif %}>
            {% for cert in certificate_images() %}
              <div class="partner-item">
                <img src="/static/img/certificates/{{ cert['image'] }}" alt="{{ cert['name'] }}">
              </div>
            {% endfor %}
          </div>
        {% endfor %}
      </div>
    </div>
  </section>
{% endif %}
