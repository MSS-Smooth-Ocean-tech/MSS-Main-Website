<style>
.latest-insights {
  background: #fff;
  padding: 100px 32px;
}
.li-inner { max-width: 1200px; margin: 0 auto; }

.li-header {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  margin-bottom: 56px;
  flex-wrap: wrap;
  gap: 20px;
}
.li-eyebrow {
  font-family: 'Sora', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #94a3b8;
  display: block;
  margin-bottom: 10px;
}
.li-title {
  font-family: 'Sora', sans-serif;
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  font-weight: 800;
  color: #0f172a;
  line-height: 1.2;
  margin-bottom: 14px;
}
.li-underline {
  width: 48px;
  height: 3px;
  background: #184172;
  border-radius: 2px;
}
.li-view-all {
  font-family: 'Sora', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: #2563eb;
  transition: gap 0.2s;
  white-space: nowrap;
}
.li-view-all:hover { text-decoration: underline; }

.li-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
  margin-bottom: 48px;
}
@media (max-width: 900px) { .li-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .li-grid { grid-template-columns: 1fr; } }

.li-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.07);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  color: inherit;
}
.li-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }

.li-card-img {
  position: relative;
  height: 200px;
  overflow: hidden;
}
.li-card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}
.li-card:hover .li-card-img img { transform: scale(1.05); }

.li-card-date {
  position: absolute;
  bottom: 0; right: 0;
  background: #0f172a;
  color: #fff;
  text-align: center;
  padding: 8px 14px;
  min-width: 64px;
}
.li-date-num {
  font-family: 'Sora', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  line-height: 1;
}
.li-date-month {
  font-family: 'Sora', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  background: ##184172;
  margin: 4px -14px -8px;
  padding: 3px 0;
  text-transform: uppercase;
}

.li-card-tag {
  position: absolute;
  top: 12px; left: 12px;
  background: rgba(15,23,42,0.75);
  color: #fff;
  font-family: 'Sora', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  backdrop-filter: blur(4px);
}

.li-card-body { padding: 24px; display: flex; flex-direction: column; flex: 1; }
.li-card-author {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: #64748b;
  margin-bottom: 12px;
}
.li-card-author svg { stroke: #64748b; }
.li-card-title {
  font-family: 'Sora', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.4;
  margin-bottom: 12px;
}
.li-card-divider {
  width: 36px;
  height: 3px;
  background: #184172;
  border-radius: 2px;
  margin-bottom: 12px;
}
.li-card-desc {
  font-size: 0.85rem;
  color: #64748b;
  line-height: 1.65;
  flex: 1;
}

.li-more-wrap { text-align: center; }
.li-more-btn {
  display: inline-block;
  background: #184172;
  color: #fff;
  font-family: 'Sora', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  padding: 14px 40px;
  border-radius: 100px;
  transition: background 0.2s, transform 0.2s;
}
.li-more-btn:hover { background: #225899; transform: translateY(-2px); }
</style>
<!-- ══ LATEST INSIGHTS ══ -->
<section class="latest-insights" id="latest-insights-section" style="display: none;">
  <div class="li-inner">
    <div class="li-header">
      <div>
        <h2 class="li-title">News & Updates</h2>
      </div>
    </div>

    <div class="li-grid" id="latest-insights-grid">
      <!-- Injected via JS -->
    </div>

    <div class="li-more-wrap">
      <a href="{{ url_for('blogs') }}" class="li-more-btn">More Posts</a>
    </div>

  </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    // If blog object is available (on blog_detailed page), extract slug to exclude
    let excludeSlug = "";
    {% if blog and blog.slug %}
        excludeSlug = "{{ blog.slug }}";
    {% endif %}

    const url = excludeSlug ? `/api/latest_blogs?exclude_slug=${excludeSlug}` : `/api/latest_blogs`;
    
    try {
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.status === 'success' && data.data && data.data.length >= 3) {
            const grid = document.getElementById('latest-insights-grid');
            grid.innerHTML = '';
            
            data.data.forEach(item => {
                const day = item.added_on ? item.added_on.substring(8, 10) : '';
                const monthNum = item.added_on ? item.added_on.substring(5, 7) : '';
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const month = monthNum ? months[parseInt(monthNum)-1] : '';
                
                const authorStr = item.author_name ? item.author_name : (item.added_by ? item.added_by.split('@')[0].replace('.', ' ') : '');
                
                grid.innerHTML += `
                <a href="/resources/${item.slug}" class="li-card">
                  <div class="li-card-img" style="background:#0f172a; display:flex; align-items:center; justify-content:center;">
                    ${item.cover_image ? `<img src="${item.cover_image}" alt="Cover" />` : `<div style="color:white; font-family:'Sora'; font-weight:700; font-size:1.5rem;">MSS</div>`}
                    <div class="li-card-date">
                      <div class="li-date-num">${day}</div>
                      <div class="li-date-month">${month}</div>
                    </div>
                    <div class="li-card-tag">Insight</div>
                  </div>
                  <div class="li-card-body">
                    <div class="li-card-author" style="text-transform: capitalize;">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                      ${authorStr}
                    </div>
                    <div class="li-card-title">${item.title}</div>
                    <div class="li-card-divider"></div>
                    <p class="li-card-desc" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">${item.summary}</p>
                  </div>
                </a>`;
            });
            
            document.getElementById('latest-insights-section').style.display = 'block';
        }
    } catch (e) {
        console.error("Latest Blogs Error: " + e);
    }
});
</script>
