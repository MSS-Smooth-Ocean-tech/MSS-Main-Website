{% extends 'admin/navbar.html' %}
{% block content %}
<style>
/* Mimicking admin dashboard block aesthetic */
.form-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  padding: 30px;
  margin-top: 20px;
  max-width: 600px;
}
.form-group {
  margin-bottom: 24px;
}
.form-group label {
  display: block;
  font-weight: 600;
  margin-bottom: 8px;
  color: #374151;
}
.form-group input[type="text"] {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
}
.submit-btn {
  background: var(--mss-primary, #184172);
  color: #fff;
  padding: 12px 24px;
  border: none;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.submit-btn:hover {
  opacity: 0.9;
}
.pfp-preview {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #f1f5f9;
  margin-bottom: 12px;
  display: block;
}
</style>

<div class="section active">
  <div class="section-header" style="font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 10px;">Public Identity</div>
  <p style="color: #6b7280; margin-bottom: 24px;">Configure the identity shown automatically when authoring publications.</p>

  <div class="form-card">
    <form action="/admin/public_profile" method="POST" enctype="multipart/form-data">
      
      <div class="form-group">
        <label>Author Avatar</label>
        {% if profile and profile.pfp_url %}
          <img src="{{ profile.pfp_url }}" alt="Profile Picture Preview" id="pfpPreview" class="pfp-preview" />
        {% else %}
          <img src="https://via.placeholder.com/100" alt="Profile Picture Preview" id="pfpPreview" class="pfp-preview" />
        {% endif %}
        <input type="file" name="pfp" id="pfpInput" accept="image/*" style="font-size:14px; color:#6b7280;" />
      </div>

      <div class="form-group">
        <label for="fullName">Author Display Name</label>
        <input type="text" name="name" id="fullName" placeholder="e.g. Jonathan Editorial" value="{{ profile.name if profile and profile.name else '' }}" required />
      </div>

      <button type="submit" class="submit-btn" id="saveBtn">Save Identity configuration</button>

    </form>
  </div>
</div>

<script>
  // Simple bind to preview PFP natively
  const pfpInput = document.getElementById('pfpInput');
  const pfpPreview = document.getElementById('pfpPreview');
  const saveBtn = document.getElementById('saveBtn');

  pfpInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        pfpPreview.src = e.target.result;
      }
      reader.readAsDataURL(file);
    }
  });

  const form = document.querySelector('form');
  form.addEventListener('submit', function() {
      saveBtn.innerText = "Saving configuration...";
      saveBtn.style.opacity = "0.7";
      saveBtn.style.pointerEvents = "none";
  });
</script>
{% endblock %}
