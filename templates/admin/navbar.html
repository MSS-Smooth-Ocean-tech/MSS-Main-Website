<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSS Admin Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="{{ url_for('static', path='/css/base.css') }}?v=1.1" />
    <link rel="stylesheet" href="{{ url_for('static', path='/css/admin.css') }}?v=1.1" />
    <style>
      /* Override core admin.css settings to accommodate the new navigation UI */
      body {
          display: block !important;
          background-color: #f8fafc; 
          height: 100% !important;
          overflow: auto !important;
      }
      .main-content {
          padding-top: 100px !important; /* Space for the absolute fixed navbar */
          background: transparent !important;
          max-width: 1000px;
          margin: 0 auto;
      }
      .admin-user-info {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-left:auto; 
          color: #111827;     
      }
      .admin-user-details {
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          line-height: 1.2;
      }
      .user-name-text {
          font-weight: 600;
          font-size: 14px;
          color: #111827;
      }
      .user-email-text {
          font-size: 12px;
          color: #6b7280;
      }
      .admin-avatar {
          width: 36px;
          height: 36px;
          border-radius: 50%;
          object-fit: cover;
          border: 2px solid #e5e7eb;
      }
      .admin-logout-btn {
          background-color: transparent;
          color: #ef4444;
          padding: 8px 0px;
          border-radius: 4px;
          font-weight: 600;
          font-size: 14px;
          border: none;
          cursor: pointer;
          transition: color 0.3s ease;
          margin-left: 10px;
      }
      .admin-logout-btn:hover {
          color: #dc2626;
      }
      
      /* Make sure Navbar overrides the dark theme natively so it's readable */
      .mss-navbar {
          background-color: rgba(255, 255, 255, 0.95); /* Keep it light */
      }
      .mss-nav-inner {
          position: relative;
          display: flex;
          align-items: center;
      }
      .mss-nav-links {
          display: flex;
          align-items: center;
          gap: 2rem;
          margin: 0 0 0 2rem;
          padding: 0;
          list-style: none;
      }
      .mss-nav-links a {
          color: var(--mss-black);
      }
      .mss-nav-links a:hover,
      .mss-nav-links a.active {
          color: var(--mss-primary);
      }
    </style>
  </head>
  <body>
    <!-- ══ NAVBAR ══ -->
    <nav class="mss-navbar">
      <div class="mss-nav-inner">
        <a href="/" class="mss-nav-brand">
          <div class="mss-nav-brand-icon">
            <img src="{{ url_for('static', path='/img/mss_logo.png') }}" alt="MSS Logo" style="width:120px; height:75px; margin-top:10px;" />
          </div>
        </a>
        <ul class="mss-nav-links">
          <li>
            <a href="{{ url_for('manage_blogs_page') }}">MANAGE BLOGS</a>
          </li>
          {% if request.state.is_admin %}
          <li>
            <a href="{{ url_for('admin_users') }}">MANAGE USERS</a>
          </li>
          {% endif %}
          <li>
            <a href="{{ url_for('admin_public_profile') }}">PUBLIC PROFILE</a>
          </li>
        </ul>
        
        <!-- LOGGED IN USER INFO -->
        <div class="admin-user-info">
          <div class="admin-user-details">
            <span class="user-name-text" id="navName">Loading...</span>
            <span class="user-email-text" id="navEmail">...</span>
          </div>
          <img src="https://via.placeholder.com/32" alt="Profile" class="admin-avatar" id="navAvatar" />
          <button class="admin-logout-btn" onclick="window.location.href = '/logout'">Logout</button>
        </div>
      </div>
    </nav>

    <div class="main-content">
      {% block content %}{% endblock %}
    </div>

    <!-- Shared Admin JS script for navbar parsing -->
    <script type="module" src="{{ url_for('static', path='/js/admin.js') }}?v=1.1"></script>
    
    <script>
      // Make nav links active
      document.addEventListener('DOMContentLoaded', () => {
          const currentPath = window.location.pathname;
          document.querySelectorAll('.mss-nav-links a').forEach(link => {
              if(link.getAttribute('href') === currentPath) link.classList.add('active');
              else link.classList.remove('active');
          });
      });
    </script>
  </body>
</html>
