services:
  maritime-website-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maritime_website_app
    volumes:
      - .:/srv
    ports:
      - "8003:8000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: maritime_website_net
    driver: bridge
